<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60" width="210" height="60">
  <defs>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M28 4 L50 11 L50 30 C50 42 28 52 28 52 C28 52 6 42 6 30 L6 11 Z"
        fill="#0d1a0f" stroke="url(#shieldBorder)" stroke-width="2"/>

  <!-- W shape: starts/ends at top, valleys go down, center peak in middle -->
  <path d="M12 16 L18 40 L25 27 L28 33 L31 27 L38 40 L44 16"
        stroke="url(#wGrad)" stroke-width="4.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- WELLEN wordmark -->
  <text x="62" y="38" font-family="Inter, Arial Black, sans-serif"
        font-size="22" font-weight="900" fill="url(#textGrad)"
        letter-spacing="2">WELLEN</text>
</svg>
